<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Elephant geometric outline in coral orange -->
  <!-- Head/ear circle -->
  <circle cx="90" cy="72" r="22" stroke="#E05535" stroke-width="7" fill="none"/>
  <!-- Trunk curving up -->
  <path d="M68 72 Q52 60 56 42 Q60 28 72 30" stroke="#E05535" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="88" y="88" width="38" height="42" stroke="#E05535" stroke-width="7" fill="none"/>
  <!-- Left leg -->
  <rect x="88" y="124" width="14" height="24" stroke="#E05535" stroke-width="7" fill="none"/>
  <!-- Right leg -->
  <rect x="112" y="124" width="14" height="24" stroke="#E05535" stroke-width="7" fill="none"/>
  <!-- Ear connector to body -->
  <line x1="108" y1="72" x2="108" y2="88" stroke="#E05535" stroke-width="7"/>
  <!-- Tusk/mouth area -->
  <path d="M72 82 Q80 90 88 88" stroke="#E05535" stroke-width="7" fill="none" stroke-linecap="round"/>
</svg>
